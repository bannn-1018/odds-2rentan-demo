# nginx config cho OpAppHtmlDemo (static HTML demo)
# Hỗ trợ clean URL: /keiba/SpRaceInfo.do -> phục vụ SpRaceInfo.do.html
# (giống hành vi của GitHub Pages)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Không cache HTML để anh em luôn thấy bản mới nhất sau mỗi lần deploy
    location ~* \.(?:html|do)$ {
        add_header Cache-Control "no-store";
    }
}
