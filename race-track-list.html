<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes">
<title>カレンダー表示 競技場一覧</title>
<style>
  :root {
    --ink: #333333;
    --ink-soft: #999999;
    --line: #dedede;
  }

  * { box-sizing: border-box; }
  html {
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  body {
    margin: 0;
    width: 100%;
    min-height: 100vh;
    font-family: "Hiragino Kaku Gothic Pro", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
    background: #ffffff;
    color: var(--ink);
    -webkit-tap-highlight-color: transparent;
  }

  .icon { display: inline-flex; }
  .icon svg { display: block; }

  /* ---- modal content ---- */
  .sheet {
    background: #ffffff;
    display: flex;
    flex-direction: column;
  }

  /* ---- scrollable body ---- */
  .sheet-body {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }

  .sheet-note {
    font-size: 14px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.5;
    padding: 14px 16px 4px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    padding: 16px 16px 8px;
  }

  .track-list { list-style: none; margin: 0; padding: 0; }
  .track-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
    padding: 18px 16px;
    border: none;
    background: #ffffff;
    text-align: left;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    font: inherit;
    text-decoration: none;
    color: inherit;
  }
  .track-item:active { background: #f6f6f6; }
  .track-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .track-item .icon { width: 16px; height: 16px; color: var(--ink-soft); flex-shrink: 0; }
</style>

<div class="sheet">
  <div class="sheet-body">

    <h2 class="section-title">開催中の競技場</h2>
    <ul class="track-list" id="activeList"></ul>

    <h2 class="section-title">その他の競技場</h2>
    <ul class="track-list" id="otherList"></ul>
  </div>
</div>

<script>
  var CHEVRON = '<span class="icon"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.4 0.9L3.91 1.38C3.76 1.53 3.68 1.73 3.68 1.95C3.68 2.16 3.76 2.36 3.91 2.51L9.39 7.99L3.91 13.48C3.75 13.63 3.67 13.83 3.67 14.05C3.67 14.26 3.75 14.46 3.91 14.61L4.39 15.09C4.7 15.41 5.21 15.41 5.52 15.09L12.07 8.56C12.23 8.41 12.33 8.21 12.33 7.99C12.33 7.77 12.23 7.57 12.07 7.43L5.55 0.9C5.39 0.75 5.19 0.67 4.97 0.67C4.76 0.67 4.55 0.75 4.41 0.9H4.4Z" fill="currentColor"/></svg></span>';

  var activeTracks = ['盛岡', '名古屋', '園田', '笠松', '金沢'];
  var otherTracks = ['水沢', '帯広', '姫路', '高知', '開催地名'];

  // 競技場名 → joCode（開催カレンダーへ引き継ぎ、日付選択時に app へ通知する）。
  // ※ デモ用の値。実データに合わせて調整すること。
  var TRACK_JO_CODE = {
    '盛岡': '10',
    '水沢': '11',
    '金沢': '22',
    '笠松': '23',
    '名古屋': '24',
    '園田': '27',
    '姫路': '28',
    '高知': '31',
    '帯広': '3',
    '開催地名': '0'
  };

  function trackHTML(name) {
    var joCode = TRACK_JO_CODE[name] || '';
    var href = 'race-track-schedule.html?track=' + encodeURIComponent(name) +
      '&joCode=' + encodeURIComponent(joCode);
    return '<li><a class="track-item" href="' + href + '">' +
      '<span class="track-name">' + name + '</span>' + CHEVRON +
    '</a></li>';
  }

  document.getElementById('activeList').innerHTML = activeTracks.map(trackHTML).join('');
  document.getElementById('otherList').innerHTML = otherTracks.map(trackHTML).join('');

  // 競技場一覧表示中はヘッダーを既定タイトルに戻す（title 省略で app 側が既定へ）。
  if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
    window.flutter_inappwebview.callHandler('setTitle', {});
  }
</script>
